<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MSS Workspace Enterprise 2026.3</title>
<style>
:root{--navy:#13274b;--blue:#0866d8;--light:#f5f8fc;--card:#fff;--line:#d8e2ef;--text:#061b3f;--muted:#667694;--green:#18a957;--yellow:#d88a00;--red:#d93025;--purple:#6842d9}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--light);color:var(--text)}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,#081a35,#13274b);color:#fff;padding:18px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:24px}.logo{width:48px;height:48px;border:2px solid #39a7ff;border-radius:50%;display:grid;place-items:center;font-weight:900}.brand h1{font-size:19px;letter-spacing:2px;margin:0}.brand small{color:#96c8ff}.nav button{width:100%;border:0;background:transparent;color:#d9e8ff;text-align:left;padding:12px;border-radius:10px;margin:3px 0;font-weight:700;cursor:pointer}.nav button:hover,.nav button.active{background:#0b63ce;color:white}.main{padding:26px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:16px}.search{flex:1;max-width:620px}.search input,.field input,.field select,textarea{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:15px}.pill{background:#eaf3ff;color:#0755b0;border:1px solid #c7def8;padding:9px 12px;border-radius:999px;font-weight:800}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 6px 18px rgba(10,30,70,.06)}.span4{grid-column:span 4}.span6{grid-column:span 6}.span8{grid-column:span 8}.span12{grid-column:span 12}.section-title{display:flex;align-items:center;gap:12px;margin:28px 0 12px}.section-title .icon{width:42px;height:42px;border-radius:14px;background:var(--blue);display:grid;place-items:center;color:white;font-size:22px}.toolgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}.tool{position:relative}.tool h3{margin:0 0 8px}.meta{color:var(--muted);font-size:13px;line-height:1.45}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.btn{border:0;background:var(--blue);color:white;padding:9px 12px;border-radius:10px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block}.btn.secondary{background:#e8eef7;color:#123}.btn.ghost{background:white;border:1px solid var(--line);color:#123}.star{position:absolute;right:14px;top:14px;border:0;background:#eef4ff;border-radius:50%;width:34px;height:34px;cursor:pointer}.star.on{background:#fff3c4}.status{display:inline-flex;align-items:center;gap:6px;padding:6px 9px;border-radius:999px;font-size:12px;font-weight:900;margin:8px 0}.ready{background:#e7f8ee;color:#08743b}.warn{background:#fff4df;color:#9a5b00}.missing{background:#ffe8e6;color:#a51d15}.tag{display:inline-block;padding:5px 8px;border-radius:999px;background:#eef4ff;color:#1f4d8a;font-size:12px;font-weight:800;margin:3px}.hidden{display:none}.kpi{font-size:30px;font-weight:900}.muted{color:var(--muted)}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px;border-bottom:1px solid var(--line);text-align:left}.table th{color:#50617f;font-size:13px}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.toast{position:fixed;right:18px;bottom:18px;background:#071a35;color:white;padding:12px 16px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.25);display:none}.appform{border:1px solid var(--line);border-radius:14px;padding:14px;margin:12px 0;background:#fbfdff}.reqs{font-size:12px;margin-top:8px}.filebox{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;margin-bottom:12px}.filehead{display:flex;justify-content:space-between;gap:12px;align-items:center}.filehead b{font-size:17px}@media(max-width:900px){.app{grid-template-columns:1fr}.side{height:auto;position:relative}.span4,.span6,.span8{grid-column:span 12}.top{display:block}.search{max-width:none;margin-top:12px}.two{grid-template-columns:1fr}}
</style></head><body><div class="app"><aside class="side"><div class="brand"><div class="logo">MSS</div><div><h1>MSS WORKSPACE</h1><small>Enterprise 2026.3</small></div></div><div class="nav" id="nav"></div></aside><main class="main"><div class="top"><div><h1 id="pageTitle">Home</h1><div class="muted" id="subtitle">Facility operating system for analytics, tools, data, and learning.</div></div><div class="search"><input id="search" placeholder="Search apps, guides, data sources..."></div><div class="pill" id="facilityPill">My Sport Space Facility</div></div><div id="content"></div></main></div><div id="toast" class="toast"></div>
<script>
const DATA_TYPES={reservations:'Reservations CSV',memberships:'Membership CSV',stripeBalance:'Stripe Balance History CSV',stripeFees:'Stripe Fees CSV',attendance:'Attendance CSV',leagueApps:'LeagueApps Export CSV',facilitySetup:'Facility Setup File'};
const APPS=[
{id:'revenue',name:'Revenue Forecaster',cat:'Business Intelligence',desc:'Forecast reservations, memberships, events, parties, and expected monthly revenue.',version:'2026.1',needs:['reservations','memberships']},
{id:'financial',name:'Financial Dashboard / Stripe Reconciliation',cat:'Business Intelligence',desc:'Reconcile Stripe deposits, MSS fees, refunds, cash/invoice activity, and facility net revenue.',version:'2026.1',needs:['reservations','stripeBalance','stripeFees']},
{id:'utilization',name:'Utilization Dashboard',cat:'Business Intelligence',desc:'Analyze court/field usage, heat maps, parent-child areas, and operating efficiency.',version:'2026.1',needs:['reservations','facilitySetup']},
{id:'dailyops',name:'Daily Operations Dashboard',cat:'Business Intelligence',desc:'Review today’s reservations, payments, failures, sports mix, and facility activity.',version:'2026.1',needs:['reservations']},
{id:'executive',name:'Executive Dashboard',cat:'Business Intelligence',desc:'Owner-level snapshot of revenue, utilization, memberships, trends, and recommendations.',version:'Coming Soon',needs:['reservations','memberships','stripeBalance']},
{id:'membership',name:'Membership Analytics',cat:'Business Intelligence',desc:'Track recurring revenue, retention, starts, cancellations, and membership trends.',version:'Coming Soon',needs:['memberships']},
{id:'tournament',name:'Tournament Scheduler',cat:'Business Tools',desc:'Create tournament brackets, court schedules, standings, and printable schedules.',version:'2026.1',needs:['facilitySetup']},
{id:'league',name:'League Scheduler',cat:'Business Tools',desc:'Build league schedules using teams, divisions, court windows, and exceptions.',version:'2026.1',needs:['facilitySetup']},
{id:'tryouts',name:'Tryout Manager',cat:'Business Tools',desc:'Manage registrations, evaluations, team assignment, waivers, and follow-up.',version:'Concept',needs:['leagueApps']},
{id:'attendance',name:'Player Attendance Tracker',cat:'Business Tools',desc:'Track attendance by player, team, class, coach, and program.',version:'2026.1',needs:['attendance','leagueApps']},
{id:'trainer',name:'Trainer Manager',cat:'Business Tools',desc:'Advertise approved trainers or create bookable trainer offerings.',version:'Concept',needs:['facilitySetup']},
{id:'scoreboard',name:'Clock & Scoreboard',cat:'Facility Tools',desc:'Run scoreboard, clock, timer, horn, court display, and kiosk-style display screens.',version:'2026.1',needs:['facilitySetup']},
{id:'courttv',name:'Court TV Display',cat:'Facility Tools',desc:'Show current and upcoming reservations on facility TVs.',version:'Concept',needs:['reservations','facilitySetup']},
{id:'checkin',name:'Public Check-In / Waivers',cat:'Facility Tools',desc:'Public attendance, digital check-in, and waiver completion flow.',version:'Concept',needs:['attendance','leagueApps']},
{id:'pos',name:'POS',cat:'Facility Tools',desc:'Concessions, store, walk-in rentals, day passes, inventory, and receipts.',version:'Concept',needs:['facilitySetup']}
];
const SECTIONS=['Home','Business Intelligence','Business Tools','Facility Tools','Data Center','Learning Center','Administration'];
let state=JSON.parse(localStorage.getItem('mssWorkspace2026_3')||'{}');
state.links=state.links||{};state.files=state.files||{};state.favorites=state.favorites||[];state.recent=state.recent||[];state.settings=state.settings||{facilityName:'My Sport Space Facility',dataSource:'Workspace CSV Uploads'};
function save(){localStorage.setItem('mssWorkspace2026_3',JSON.stringify(state));document.getElementById('facilityPill').textContent=state.settings.facilityName||'My Sport Space Facility'}
function toast(t){let el=document.getElementById('toast');el.textContent=t;el.style.display='block';setTimeout(()=>el.style.display='none',2200)}
function ready(app){let missing=app.needs.filter(n=>!state.files[n]);return {ok:missing.length===0,missing}}
function statusHTML(app){let r=ready(app); if(r.ok)return '<span class="status ready">● Ready</span>'; return '<span class="status warn">● Missing '+r.missing.map(x=>DATA_TYPES[x]).join(', ')+'</span>'}
function nav(active){document.getElementById('nav').innerHTML=SECTIONS.map(s=>`<button class="${s===active?'active':''}" onclick="route('${s}')">${s}</button>`).join('')}
function route(sec){nav(sec);document.getElementById('pageTitle').textContent=sec;document.getElementById('search').value=''; if(sec==='Home')home(); else if(sec==='Data Center')dataCenter(); else if(sec==='Learning Center')learning(); else if(sec==='Administration')admin(); else appSection(sec)}
function launch(id,type='launch'){let app=APPS.find(a=>a.id===id);let url=(state.links[id]||{})[type]; if(!url){toast((type==='launch'?'Launch':'Link')+' URL not added for '+app.name);return} state.recent=[{id,at:new Date().toLocaleString()},...state.recent.filter(r=>r.id!==id)].slice(0,8);save();window.open(url,'_blank')}
function toolCard(app){let fav=state.favorites.includes(app.id);let links=state.links[app.id]||{};return `<div class="card tool"><button class="star ${fav?'on':''}" onclick="toggleFav('${app.id}')">★</button><h3>${app.name}</h3>${statusHTML(app)}<div class="meta">${app.desc}</div><div class="reqs">${app.needs.map(n=>`<span class="tag">${DATA_TYPES[n]}</span>`).join('')}</div><div class="meta">Version: ${app.version}</div><div class="actions"><button class="btn" onclick="launch('${app.id}','launch')">Launch</button><button class="btn secondary" onclick="launch('${app.id}','guide')">Guide</button><button class="btn ghost" onclick="launch('${app.id}','video')">Video</button></div></div>`}
function toggleFav(id){state.favorites=state.favorites.includes(id)?state.favorites.filter(x=>x!==id):[...state.favorites,id];save();route(current())}
function current(){return document.querySelector('.nav .active')?.textContent||'Home'}
function home(){let favApps=APPS.filter(a=>state.favorites.includes(a.id));let missing=APPS.filter(a=>!ready(a).ok).length;let loaded=Object.keys(state.files).length;document.getElementById('content').innerHTML=`<div class="grid"><div class="card span4"><div class="muted">Facility</div><div class="kpi">${state.settings.facilityName}</div><div class="muted">Data source: ${state.settings.dataSource}</div></div><div class="card span4"><div class="muted">Data Center</div><div class="kpi">${loaded}/7</div><div class="muted">Data sources loaded</div></div><div class="card span4"><div class="muted">Application Readiness</div><div class="kpi">${APPS.length-missing}/${APPS.length}</div><div class="muted">Apps ready based on loaded files</div></div><div class="card span6"><h2>Favorites</h2><div class="toolgrid">${favApps.length?favApps.map(toolCard).join(''):'<p class="muted">Click the star on any application to add it here.</p>'}</div></div><div class="card span6"><h2>Recently Used</h2>${state.recent.length?`<table class="table"><tbody>${state.recent.map(r=>{let a=APPS.find(x=>x.id===r.id);return `<tr><td><b>${a?.name||r.id}</b></td><td>${r.at}</td><td><button class="btn secondary" onclick="launch('${r.id}','launch')">Open</button></td></tr>`}).join('')}</tbody></table>`:'<p class="muted">No applications opened yet.</p>'}</div></div>`}
function appSection(sec){let apps=APPS.filter(a=>a.cat===sec);document.getElementById('subtitle').textContent=sec==='Business Intelligence'?'Understand performance, revenue, utilization, and trends.':sec==='Business Tools'?'Manage programs, events, teams, and communications.':'Operate displays, scoreboards, check-in, waivers, and POS.';document.getElementById('content').innerHTML=`<div class="toolgrid">${apps.map(toolCard).join('')}</div>`}
function dataCenter(){document.getElementById('subtitle').textContent='Upload once. Use across all reports and tools.';document.getElementById('content').innerHTML=`<div class="card"><h2>Shared Data Library</h2><p class="muted">These files are stored in this browser for Workspace readiness checks. Current browser security does not allow a separate GitHub app to automatically read the file contents unless we build import/export handoff into each tool, but this prepares the workflow and tracks freshness.</p>${Object.entries(DATA_TYPES).map(([k,label])=>fileBox(k,label)).join('')}</div>`}
function fileBox(k,label){let f=state.files[k];let used=APPS.filter(a=>a.needs.includes(k)).map(a=>a.name);return `<div class="filebox"><div class="filehead"><div><b>${label}</b><div class="muted">Used by: ${used.join(', ')||'None'}</div></div><span class="status ${f?'ready':'missing'}">● ${f?'Loaded':'Missing'}</span></div><div class="two" style="margin-top:12px"><input type="file" onchange="rememberFile('${k}',this)"><button class="btn secondary" onclick="clearFile('${k}')">Clear</button></div>${f?`<p class="muted">Current file: <b>${f.name}</b> • Loaded ${f.loaded}</p>`:''}</div>`}
function rememberFile(k,inp){let file=inp.files[0]; if(!file)return; state.files[k]={name:file.name,size:file.size,loaded:new Date().toLocaleString()};save();toast('Saved '+file.name);dataCenter()}
function clearFile(k){delete state.files[k];save();dataCenter()}
function learning(){document.getElementById('subtitle').textContent='Guides, videos, quick starts, samples, and release notes.';document.getElementById('content').innerHTML=`<div class="card"><h2>Learning Center</h2><table class="table"><thead><tr><th>Application</th><th>Guide</th><th>Video</th><th>Sample Files</th></tr></thead><tbody>${APPS.map(a=>`<tr><td><b>${a.name}</b><div class="muted">${a.cat}</div></td><td><button class="btn secondary" onclick="launch('${a.id}','guide')">Open Guide</button></td><td><button class="btn ghost" onclick="launch('${a.id}','video')">Open Video</button></td><td>${a.needs.map(n=>`<span class="tag">${DATA_TYPES[n]}</span>`).join('')}</td></tr>`).join('')}</tbody></table></div>`}
function admin(){document.getElementById('subtitle').textContent='General settings and application registry.';document.getElementById('content').innerHTML=`<div class="card"><h2>General Settings</h2><div class="two"><label class="field">Facility Name<input id="facilityName" value="${state.settings.facilityName||''}" oninput="state.settings.facilityName=this.value;save()"></label><label class="field">Data Source<select id="dataSource" onchange="state.settings.dataSource=this.value;save()"><option ${state.settings.dataSource==='Workspace CSV Uploads'?'selected':''}>Workspace CSV Uploads</option><option ${state.settings.dataSource==='MSS API (Future)'?'selected':''}>MSS API (Future)</option><option ${state.settings.dataSource==='Demo/Sample Data'?'selected':''}>Demo/Sample Data</option></select></label></div></div><div class="card" style="margin-top:16px"><h2>Application Registry</h2><p class="muted">Paste launch, guide, and video URLs. They save automatically in this browser.</p>${APPS.map(appForm).join('')}</div>`}
function appForm(a){let l=state.links[a.id]||{};return `<div class="appform"><b>${a.name}</b><div class="two" style="margin-top:10px"><input placeholder="Launch URL" value="${l.launch||''}" oninput="setLink('${a.id}','launch',this.value)"><input placeholder="Guide URL" value="${l.guide||''}" oninput="setLink('${a.id}','guide',this.value)"></div><div class="two" style="margin-top:10px"><input placeholder="Video URL" value="${l.video||''}" oninput="setLink('${a.id}','video',this.value)"><input placeholder="Version / Status" value="${a.version}" disabled></div></div>`}
function setLink(id,type,val){state.links[id]=state.links[id]||{};state.links[id][type]=val;save()}
document.getElementById('search').addEventListener('input',e=>{let q=e.target.value.toLowerCase().trim(); if(!q){route(current());return} nav('');document.getElementById('pageTitle').textContent='Search';document.getElementById('subtitle').textContent='Search results';let apps=APPS.filter(a=>(a.name+a.desc+a.cat+a.needs.join(' ')).toLowerCase().includes(q));document.getElementById('content').innerHTML=`<div class="toolgrid">${apps.map(toolCard).join('')||'<p>No results found.</p>'}</div>`});
save();route('Home');
</script></body></html>
