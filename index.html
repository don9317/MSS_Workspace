<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MSS Workspace Enterprise 2026.1</title>
<style>
:root{
  --navy:#0f2742; --navy2:#132f50; --blue:#1d6fb8; --blue2:#2a8de0; --sky:#e8f4ff;
  --bg:#f4f7fb; --card:#ffffff; --text:#142033; --muted:#667085; --line:#dbe5f0;
  --good:#13a36b; --warn:#f2a922; --bad:#d64545; --shadow:0 12px 30px rgba(15,39,66,.12);
}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,Roboto,Arial,sans-serif}
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,var(--navy),#071827);color:#fff;padding:22px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:24px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--blue2),#71c7ff);display:grid;place-items:center;font-weight:900}.brand h1{font-size:18px;margin:0}.brand p{margin:3px 0 0;color:#aac2da;font-size:12px}.nav button{width:100%;border:0;background:transparent;color:#dce8f5;text-align:left;padding:12px 14px;border-radius:12px;cursor:pointer;font-weight:700;margin:3px 0}.nav button:hover,.nav button.active{background:rgba(255,255,255,.12);color:#fff}.sidefoot{margin-top:26px;padding:14px;border:1px solid rgba(255,255,255,.14);border-radius:16px;background:rgba(255,255,255,.08);font-size:12px;color:#cfe0f1}.main{padding:24px 28px}.top{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:20px}.top h2{margin:0;font-size:28px}.facility{font-weight:800;color:var(--blue)}.search{width:min(520px,100%);position:relative}.search input{width:100%;padding:13px 16px 13px 42px;border:1px solid var(--line);border-radius:16px;background:#fff;outline:none;font-size:14px;box-shadow:0 4px 16px rgba(15,39,66,.04)}.search span{position:absolute;left:15px;top:12px;color:var(--muted)}.hero{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-radius:26px;padding:26px;box-shadow:var(--shadow);display:grid;grid-template-columns:1.5fr 1fr;gap:20px;margin-bottom:22px}.hero h3{font-size:30px;margin:0 0 8px}.hero p{color:#d7eafe;margin:0;line-height:1.55}.hero-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;background:var(--blue);color:white;text-decoration:none;display:inline-flex;align-items:center;gap:7px}.btn.secondary{background:#edf5ff;color:var(--navy)}.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}.btn.small{font-size:12px;padding:8px 10px}.hero .mini{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:18px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}.metric,.card,.panel{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 7px 20px rgba(15,39,66,.06)}.metric{padding:18px}.metric .num{font-size:24px;font-weight:900}.metric .lbl{color:var(--muted);font-size:13px;margin-top:4px}.section{display:none}.section.active{display:block}.section-title{display:flex;align-items:end;justify-content:space-between;margin:22px 0 12px}.section-title h3{margin:0;font-size:22px}.section-title p{margin:4px 0 0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.card{padding:18px;position:relative;overflow:hidden}.card:before{content:"";position:absolute;right:-25px;top:-25px;width:90px;height:90px;border-radius:50%;background:var(--sky)}.card h4{margin:0 0 8px;font-size:17px;position:relative}.card p{margin:0 0 16px;color:var(--muted);font-size:13px;line-height:1.45;position:relative}.tagrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tag{font-size:11px;padding:5px 8px;border-radius:999px;background:#f0f5fb;color:#40566d;font-weight:800}.tag.installed{background:#e9f8f1;color:#08784c}.tag.soon{background:#fff4df;color:#936108}.actions{display:flex;gap:8px;flex-wrap:wrap;position:relative}.star{position:absolute;right:14px;top:14px;border:0;background:transparent;font-size:21px;cursor:pointer;color:#b5c0cd}.star.on{color:#ffbf2f}.panel{padding:20px;margin-bottom:16px}.twocol{display:grid;grid-template-columns:1fr 1fr;gap:16px}.data-item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:14px;border:1px solid var(--line);border-radius:16px;margin:10px 0;background:#fbfdff}.data-status{font-size:12px;color:var(--muted)}input,select,textarea{border:1px solid var(--line);border-radius:12px;padding:10px 12px;font:inherit;width:100%;background:white}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.savebar{position:sticky;bottom:0;background:rgba(244,247,251,.95);backdrop-filter:blur(8px);padding:14px 0;text-align:right}.toast{position:fixed;right:24px;bottom:24px;background:#102842;color:#fff;padding:13px 16px;border-radius:14px;box-shadow:var(--shadow);display:none;z-index:10}.toast.show{display:block}.empty{padding:24px;border:1px dashed var(--line);border-radius:18px;color:var(--muted);background:#fff}.listrow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}.listrow:last-child{border-bottom:0}.kbd{font-family:ui-monospace,Menlo,Consolas,monospace;background:#eef3f8;border-radius:6px;padding:2px 6px;color:#40566d}.modal{position:fixed;inset:0;background:rgba(7,24,39,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:20}.modal.show{display:flex}.modal-box{background:#fff;border-radius:22px;max-width:760px;width:100%;max-height:86vh;overflow:auto;box-shadow:var(--shadow);padding:22px}.modal-head{display:flex;justify-content:space-between;align-items:center}.x{border:0;background:#edf3f9;border-radius:10px;padding:8px 10px;cursor:pointer}.guidebox{background:#f7fbff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:14px}.hide{display:none!important}
@media(max-width:980px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.grid,.metrics,.twocol,.hero{grid-template-columns:1fr}.top{display:block}.search{margin-top:12px}.main{padding:18px}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">MSS</div><div><h1>MSS Workspace</h1><p>Enterprise 2026.1</p></div></div>
    <div class="nav" id="nav"></div>
    <div class="sidefoot"><b>Data Source:</b><br><span id="dataSourceLabel">Workspace CSV Uploads</span><br><br><b>Future Ready:</b><br>Designed for MSS API connection later.</div>
  </aside>
  <main class="main">
    <div class="top"><div><h2 id="pageTitle">Home</h2><div class="facility" id="facilityLabel">My Sport Space Facility</div></div><div class="search"><span>⌕</span><input id="searchInput" placeholder="Search tools, guides, videos, templates..." /></div></div>
    <section id="home" class="section active"></section>
    <section id="bi" class="section"></section>
    <section id="biz" class="section"></section>
    <section id="facility" class="section"></section>
    <section id="data" class="section"></section>
    <section id="learning" class="section"></section>
    <section id="admin" class="section"></section>
  </main>
</div>
<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="modal-box"><div class="modal-head"><h3 id="modalTitle">Guide</h3><button class="x" onclick="closeModal()">Close</button></div><div id="modalBody"></div></div></div>
<script>
const STORE='mss_workspace_2026_1';
const defaultState={facilityName:'My Sport Space Facility',dataSource:'Workspace CSV Uploads',favorites:[],recent:[],links:{},guides:{},videos:{},data:{},colors:{primary:'#1d6fb8'}};
let state=load();
const sections=[['home','Home','🏠'],['bi','Business Intelligence','📊'],['biz','Business Tools','🛠'],['facility','Facility Tools','🏀'],['data','Data Center','📂'],['learning','Learning Center','📚'],['admin','Administration','⚙']];
const tools=[
 {id:'revenue',cat:'bi',name:'Revenue Forecaster',desc:'Forecast rentals, memberships, events, parties, and expected monthly performance.',ver:'2.4',status:'Installed'},
 {id:'financial',cat:'bi',name:'Financial Dashboard',desc:'Stripe reconciliation, revenue categories, refunds, fees, and net facility performance.',ver:'1.8',status:'Installed'},
 {id:'utilization',cat:'bi',name:'Utilization Dashboard',desc:'Analyze court, field, tunnel, sport, day, and hour utilization across the facility.',ver:'1.1',status:'Installed'},
 {id:'daily',cat:'bi',name:'Daily Operations Dashboard',desc:'Reservations, paid status, failed payments, sport mix, and today’s activity.',ver:'1.0',status:'Installed'},
 {id:'executive',cat:'bi',name:'Executive Dashboard',desc:'Owner-level summary of revenue, utilization, growth, and recommended actions.',ver:'Concept',status:'Coming Soon'},
 {id:'membership',cat:'bi',name:'Membership Analytics',desc:'Membership trends, active members, renewals, churn, and revenue contribution.',ver:'Concept',status:'Coming Soon'},
 {id:'tournament',cat:'biz',name:'Tournament Scheduler',desc:'Build pool play, bracket schedules, court assignments, and downloadable schedules.',ver:'1.0',status:'Installed'},
 {id:'league',cat:'biz',name:'League Scheduler',desc:'Create league schedules by grade, division, court availability, and exceptions.',ver:'0.6',status:'Installed'},
 {id:'tryouts',cat:'biz',name:'Tryout Manager',desc:'Manage tryout registration, ratings, team assignment, waivers, and offers.',ver:'Concept',status:'Coming Soon'},
 {id:'attendance',cat:'biz',name:'Attendance Tracker',desc:'Track attendance by player, class, team, and coach with communication tools.',ver:'0.9',status:'Installed'},
 {id:'practice',cat:'biz',name:'Practice Tracker',desc:'Track team practices, coach attendance, dates, facilities, and participation.',ver:'0.5',status:'Installed'},
 {id:'trainer',cat:'biz',name:'Trainer Manager',desc:'Approved trainers, bookable trainers, profiles, offerings, and facility rules.',ver:'Concept',status:'Coming Soon'},
 {id:'scoreboard',cat:'facility',name:'Clock & Scoreboard',desc:'Court clock, timer, scoreboard, buzzer, sponsor display, and kiosk operation.',ver:'4.2',status:'Installed'},
 {id:'courttv',cat:'facility',name:'Court TV Display',desc:'Show current and next reservations, court schedules, clock mode, and facility messages.',ver:'Concept',status:'Coming Soon'},
 {id:'checkin',cat:'facility',name:'Public Check-In',desc:'Skills, camps, classes, and attendance check-in for front desk or kiosk use.',ver:'0.9',status:'Installed'},
 {id:'waivers',cat:'facility',name:'Digital Waivers',desc:'Capture missing waivers during check-in or event registration workflows.',ver:'Concept',status:'Coming Soon'},
 {id:'pos',cat:'facility',name:'POS',desc:'Concessions, store, rentals, training sessions, day passes, and receipts.',ver:'Concept',status:'Coming Soon'},
 {id:'signage',cat:'facility',name:'Digital Signage',desc:'Announcements, sponsor ads, court schedules, welcome screens, and facility messaging.',ver:'Concept',status:'Coming Soon'}
];
const dataTypes=[['reservations','Reservation CSV','Used by Revenue Forecaster, Utilization, Daily Ops'],['memberships','Membership CSV','Used by Revenue Forecaster and Membership Analytics'],['stripe','Stripe / Financial CSV','Used by Financial Dashboard and reconciliation'],['attendance','Attendance CSV','Used by Attendance Tracker and team analytics'],['facilitysetup','Facility Setup File','Hours, courts, sports, rules, branding, and preferences']];
function load(){try{return {...defaultState,...JSON.parse(localStorage.getItem(STORE)||'{}')}}catch(e){return defaultState}}
function save(){localStorage.setItem(STORE,JSON.stringify(state));render()}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function nav(){document.getElementById('nav').innerHTML=sections.map(s=>`<button data-sec="${s[0]}" onclick="show('${s[0]}')">${s[2]} ${s[1]}</button>`).join('')}
function show(id){document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.sec===id));document.getElementById('pageTitle').textContent=sections.find(s=>s[0]===id)[1];document.getElementById('searchInput').value='';filterCards('')}
function toolCard(t){const fav=state.favorites.includes(t.id), link=state.links[t.id], guide=state.guides[t.id], video=state.videos[t.id];return `<div class="card tool-card" data-search="${esc((t.name+' '+t.desc+' '+t.cat).toLowerCase())}"><button class="star ${fav?'on':''}" onclick="toggleFav('${t.id}')">★</button><h4>${esc(t.name)}</h4><p>${esc(t.desc)}</p><div class="tagrow"><span class="tag ${t.status==='Installed'?'installed':'soon'}">${t.status}</span><span class="tag">v ${esc(t.ver)}</span><span class="tag">${esc(lastUsed(t.id))}</span></div><div class="actions"><button class="btn small" onclick="launchTool('${t.id}')">Launch</button><button class="btn secondary small" onclick="openGuide('${t.id}')">Guide</button><button class="btn ghost small" onclick="openNew('${t.id}')">New Tab</button>${video?`<button class="btn ghost small" onclick="window.open('${esc(video)}','_blank')">Video</button>`:''}</div></div>`}
function lastUsed(id){const r=state.recent.find(x=>x.id===id);return r?'Last used '+new Date(r.when).toLocaleDateString():'Not used yet'}
function launchTool(id){const url=state.links[id]; if(!url){toast('No launch link saved yet. Add it in Administration.');show('admin');return} markRecent(id); window.open(url,'_self')}
function openNew(id){const url=state.links[id]; if(!url){toast('No launch link saved yet. Add it in Administration.');show('admin');return} markRecent(id); window.open(url,'_blank')}
function openGuide(id){const t=tools.find(x=>x.id===id); const g=state.guides[id]; if(g){window.open(g,'_blank');return} document.getElementById('modalTitle').textContent=t.name+' Guide';document.getElementById('modalBody').innerHTML=`<div class="guidebox"><b>Guide link not added yet.</b><p>Add a guide URL in Administration. This placeholder keeps the help system available while the final guides are created.</p><p><b>Recommended sections:</b></p><ol><li>What this tool does</li><li>Required files/data</li><li>Step-by-step instructions</li><li>Common issues</li><li>Best practices</li></ol><button class="btn" onclick="show('admin');closeModal()">Add Guide Link</button></div>`;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function markRecent(id){state.recent=[{id,when:Date.now()},...state.recent.filter(x=>x.id!==id)].slice(0,8);localStorage.setItem(STORE,JSON.stringify(state))}
function toggleFav(id){state.favorites=state.favorites.includes(id)?state.favorites.filter(x=>x!==id):[...state.favorites,id];save();toast('Favorites updated')}
function cardsFor(cat){return tools.filter(t=>t.cat===cat).map(toolCard).join('')}
function home(){const favs=tools.filter(t=>state.favorites.includes(t.id));const recent=state.recent.map(r=>tools.find(t=>t.id===r.id)).filter(Boolean);const loaded=Object.keys(state.data||{}).length;document.getElementById('home').innerHTML=`<div class="hero"><div><h3>Run smarter. Grow faster.</h3><p>MSS Workspace brings Business Intelligence, Business Tools, Facility Tools, Data Center, Learning Center, and Administration into one operating environment.</p><div class="hero-actions"><button class="btn secondary" onclick="show('bi')">Open Business Intelligence</button><button class="btn secondary" onclick="show('data')">Open Data Center</button><button class="btn secondary" onclick="show('admin')">Configure Links</button></div></div><div class="mini"><b>Workspace Status</b><p style="margin-top:10px">${tools.filter(t=>t.status==='Installed').length} installed tools<br>${state.favorites.length} favorites<br>${loaded} data files loaded<br>Access mode: MSS module / protected host recommended</p></div></div><div class="metrics"><div class="metric"><div class="num">${tools.filter(t=>t.cat==='bi').length}</div><div class="lbl">Business Intelligence Apps</div></div><div class="metric"><div class="num">${tools.filter(t=>t.cat==='biz').length}</div><div class="lbl">Business Tools</div></div><div class="metric"><div class="num">${tools.filter(t=>t.cat==='facility').length}</div><div class="lbl">Facility Tools</div></div><div class="metric"><div class="num">${loaded}/5</div><div class="lbl">Data Center Files</div></div></div><div class="twocol"><div class="panel"><h3>Favorites</h3>${favs.length?`<div class="grid" style="grid-template-columns:1fr">${favs.map(toolCard).join('')}</div>`:'<div class="empty">Click the star on any tool to pin it here.</div>'}</div><div class="panel"><h3>Recently Used</h3>${recent.length?recent.map(t=>`<div class="listrow"><div><b>${esc(t.name)}</b><br><span class="data-status">${esc(lastUsed(t.id))}</span></div><button class="btn small" onclick="launchTool('${t.id}')">Launch</button></div>`).join(''):'<div class="empty">Launch a tool and it will appear here.</div>'}</div></div>`}
function category(sec,title,subtitle){document.getElementById(sec).innerHTML=`<div class="section-title"><div><h3>${title}</h3><p>${subtitle}</p></div></div><div class="grid">${cardsFor(sec)}</div>`}
function dataCenter(){document.getElementById('data').innerHTML=`<div class="panel"><h3>Workspace Data Center</h3><p style="color:var(--muted)">Upload once here. For now, Workspace stores file names and freshness status. Reports still use their own upload buttons until each report is wired to read Workspace data. Later, this same screen can switch from CSV uploads to the MSS API.</p>${dataTypes.map(([id,n,d])=>{const m=state.data[id];return `<div class="data-item"><div><b>${n}</b><br><span class="data-status">${d}<br>${m?`✅ ${esc(m.name)} · loaded ${new Date(m.when).toLocaleString()}`:'No file loaded yet'}</span></div><div><input type="file" id="file_${id}" onchange="storeFileMeta('${id}',this)" style="max-width:260px"></div></div>`}).join('')}<button class="btn ghost" onclick="clearData()">Clear Data Center</button></div>`}
function storeFileMeta(id,input){const f=input.files&&input.files[0]; if(!f)return; state.data[id]={name:f.name,size:f.size,when:Date.now()};save();toast('File status saved')}
function clearData(){if(confirm('Clear all saved file status?')){state.data={};save();toast('Data Center cleared')}}
function learning(){document.getElementById('learning').innerHTML=`<div class="section-title"><div><h3>Learning Center</h3><p>Guides, videos, quick starts, sample files, release notes, and help for every Workspace module.</p></div></div><div class="grid">${tools.map(t=>`<div class="card"><h4>${esc(t.name)}</h4><p>Open the guide, training video, sample files, or release notes for this module.</p><div class="actions"><button class="btn small" onclick="openGuide('${t.id}')">Guide</button>${state.videos[t.id]?`<button class="btn secondary small" onclick="window.open('${esc(state.videos[t.id])}','_blank')">Video</button>`:`<button class="btn ghost small" onclick="toast('Video link not added yet')">Video</button>`}<button class="btn ghost small" onclick="toast('Sample files can be linked in a future version')">Samples</button></div></div>`).join('')}</div>`}
function admin(){document.getElementById('admin').innerHTML=`<div class="panel"><h3>Administration Center</h3><p style="color:var(--muted)">Paste launch, guide, and video URLs here. They save in this browser automatically.</p><div class="formgrid"><label>Facility Name<input id="facilityNameInput" value="${esc(state.facilityName)}"></label><label>Data Source<select id="dataSourceInput"><option ${state.dataSource==='Workspace CSV Uploads'?'selected':''}>Workspace CSV Uploads</option><option ${state.dataSource==='MSS Live API'?'selected':''}>MSS Live API</option><option ${state.dataSource==='Sample Demo Data'?'selected':''}>Sample Demo Data</option></select></label></div></div><div class="panel"><h3>Tool Links</h3>${tools.map(t=>`<div class="data-item" style="grid-template-columns:1fr"><div><b>${esc(t.name)}</b><div class="formgrid" style="margin-top:10px"><input id="link_${t.id}" placeholder="Launch URL" value="${esc(state.links[t.id]||'')}"><input id="guide_${t.id}" placeholder="Guide URL" value="${esc(state.guides[t.id]||'')}"><input id="video_${t.id}" placeholder="Video URL" value="${esc(state.videos[t.id]||'')}"></div></div></div>`).join('')}</div><div class="savebar"><button class="btn ghost" onclick="resetAll()">Reset Workspace</button> <button class="btn" onclick="saveAdmin()">Save Administration Settings</button></div>`}
function saveAdmin(){state.facilityName=document.getElementById('facilityNameInput').value||'My Sport Space Facility';state.dataSource=document.getElementById('dataSourceInput').value;tools.forEach(t=>{state.links[t.id]=document.getElementById('link_'+t.id).value.trim();state.guides[t.id]=document.getElementById('guide_'+t.id).value.trim();state.videos[t.id]=document.getElementById('video_'+t.id).value.trim();});save();toast('Administration settings saved')}
function resetAll(){if(confirm('Reset all Workspace settings, links, favorites, recent apps, and data status?')){localStorage.removeItem(STORE);state=load();render();toast('Workspace reset')}}
function filterCards(q){q=q.toLowerCase();document.querySelectorAll('.tool-card,.card').forEach(c=>{const s=(c.dataset.search||c.textContent).toLowerCase();c.classList.toggle('hide',q && !s.includes(q))})}
document.getElementById('searchInput').addEventListener('input',e=>filterCards(e.target.value));
function render(){document.getElementById('facilityLabel').textContent=state.facilityName;document.getElementById('dataSourceLabel').textContent=state.dataSource;nav();home();category('bi','Business Intelligence','Understand performance, revenue, utilization, financials, and growth.');category('biz','Business Tools','Manage programs, leagues, tournaments, attendance, tryouts, trainers, and communications.');category('facility','Facility Tools','Operate the building with scoreboard, Court TV, check-in, waivers, POS, and signage.');dataCenter();learning();admin();const active=document.querySelector('.section.active')?.id||'home';show(active)}
render();
</script>
</body>
</html>
